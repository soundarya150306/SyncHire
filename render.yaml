services:
  - type: web
    name: synchire-frontend
    env: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    rootDirectory: frontend

  - type: web
    name: synchire-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDirectory: backend
    disk:
      name: persist-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/cv_screening.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: GEMINI_API_KEY
        sync: false
