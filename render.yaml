services:
  # Frontend Static Site
  - type: web
    name: synchire-frontend
    runtime: static  # Use runtime instead of env for static sites
    buildCommand: npm install && npm run build
    publishPath: ./dist  # Fixed from staticPublishPath
    rootDirectory: frontend

  # Backend FastAPI Server
  - type: web
    name: synchire-backend
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    rootDirectory: backend
    disk:
      name: persist-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATABASE_URL
        value: sqlite:////data/cv_screening.db
      - key: UPLOAD_DIR
        value: /data/uploads
      - key: GEMINI_API_KEY
        sync: false
